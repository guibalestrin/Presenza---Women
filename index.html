<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: #0E0709;
    color: #F8EDE8;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height: 100vh; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3D2820; border-radius: 2px; }
  input, textarea { -webkit-appearance: none; appearance: none; }
  input:focus { outline: none; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes shimmer-sweep {
    0%   { background-position: -250% center; }
    100% { background-position: 250% center; }
  }
  @keyframes orb-drift-a {
    0%, 100% { transform: translate(-50%, 0) scale(1);   opacity: 0.55; }
    40%       { transform: translate(-50%, -28px) scale(1.08); opacity: 0.80; }
    70%       { transform: translate(-50%, 14px) scale(0.96);  opacity: 0.60; }
  }
  @keyframes orb-drift-b {
    0%, 100% { transform: translate(-50%, 0) scale(1);   opacity: 0.35; }
    35%       { transform: translate(-50%, 20px) scale(1.1); opacity: 0.55; }
    65%       { transform: translate(-50%, -16px) scale(0.94); opacity: 0.40; }
  }
  @keyframes sparkle-in {
    0%   { opacity: 0; transform: scale(0.4) rotate(-20deg); }
    60%  { opacity: 1; transform: scale(1.15) rotate(4deg); }
    100% { opacity: 0.7; transform: scale(1) rotate(0deg); }
  }
  @keyframes sparkle-float {
    0%, 100% { transform: translateY(0) rotate(0deg);   opacity: 0.5; }
    50%       { transform: translateY(-6px) rotate(12deg); opacity: 0.9; }
  }
  @keyframes score-fill {
    from { stroke-dashoffset: 283; }
  }
  @keyframes border-glow {
    0%, 100% { box-shadow: 0 0 0 1px rgba(196,137,106,0.6), 0 0 12px rgba(196,137,106,0.2); }
    50%       { box-shadow: 0 0 0 1px rgba(196,137,106,0.9), 0 0 20px rgba(196,137,106,0.35); }
  }
  @keyframes card-rise {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .fade-up  { animation: fadeUp  0.48s cubic-bezier(0.22,1,0.36,1) both; }
  .fade-in  { animation: fadeIn  0.35s ease both; }
  .s1 { animation-delay: 0.05s; }
  .s2 { animation-delay: 0.13s; }
  .s3 { animation-delay: 0.21s; }
  .s4 { animation-delay: 0.29s; }
  .s5 { animation-delay: 0.37s; }
  .s6 { animation-delay: 0.45s; }

  /* ── GRADIENTS ── */
  .rose-gradient {
    background: linear-gradient(110deg, #C4896A, #E8C4B4, #C4896A);
    background-size: 220% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── SHIMMER BUTTON ── */
  .btn-shimmer {
    background: linear-gradient(110deg, #C4896A 0%, #E8C4B4 40%, #D9A882 60%, #C4896A 100%);
    background-size: 250% auto;
    animation: shimmer-sweep 2.8s linear infinite;
    color: #1A0C09;
    font-weight: 700;
    letter-spacing: 0.4px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-shimmer:hover  { opacity: 0.92; transform: translateY(-1px); }
  .btn-shimmer:active { opacity: 0.85; transform: translateY(0); }

  /* ── TAGS ── */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 11px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    background: rgba(196,137,106,0.08);
    color: #9A7870;
    border: 1px solid rgba(196,137,106,0.18);
    white-space: nowrap;
  }
  .tag.accent {
    background: rgba(196,137,106,0.15);
    color: #C4896A;
    border-color: rgba(196,137,106,0.35);
  }

  /* ── CLOTHING CARD ── */
  .clothing-card {
    cursor: pointer; border-radius: 14px; overflow: hidden;
    border: 1px solid #2C1A18;
    background: #180E0D;
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  }
  .clothing-card:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 28px rgba(196,137,106,0.12);
    border-color: rgba(196,137,106,0.3);
  }
  .clothing-card.selected {
    border-color: #C4896A;
    box-shadow: 0 0 0 1px #C4896A, 0 6px 24px rgba(196,137,106,0.25);
    animation: border-glow 2s ease-in-out infinite;
    transform: scale(1.02);
  }

  /* ── LOOK CARD ── */
  .look-card {
    background: #180E0D;
    border: 1px solid #2C1A18;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .look-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(196,137,106,0.15);
  }

  /* ── OCCASION CARD ── */
  .occ-card {
    border-radius: 16px;
    border: 1px solid #2C1A18;
    background: #180E0D;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .occ-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(196,137,106,0.07) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .occ-card:hover { border-color: rgba(196,137,106,0.5); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,137,106,0.1); }
  .occ-card:hover::before { opacity: 1; }

  /* ── STYLE CARD ── */
  .style-card {
    border-radius: 14px;
    border: 1px solid #2C1A18;
    background: #180E0D;
    text-align: left;
    transition: all 0.2s;
  }
  .style-card.active {
    background: rgba(196,137,106,0.1);
    border-color: #C4896A;
  }
  .style-card:hover:not(.active) { border-color: rgba(196,137,106,0.3); }

  /* ── SCORE RING ── */
  .score-ring circle.bg   { stroke: #2C1A18; }
  .score-ring circle.fill {
    stroke-linecap: round;
    animation: score-fill 0.9s cubic-bezier(0.22,1,0.36,1) both;
    transition: stroke-dashoffset 0.9s ease;
  }

  /* ── SPARKLE DECORATION ── */
  .sparkle {
    position: absolute;
    color: #C4896A;
    animation: sparkle-float 3.5s ease-in-out infinite;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  /* ── MODE CARD A ── */
  .mode-card-a {
    background: linear-gradient(145deg, #1F1008, #2A1510);
    border: 1px solid rgba(196,137,106,0.35);
    border-radius: 18px;
    padding: 22px 18px;
    text-align: left;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .mode-card-a::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,137,106,0.18) 0%, transparent 70%);
  }
  .mode-card-a:hover { transform: scale(1.02); box-shadow: 0 8px 28px rgba(196,137,106,0.15); }

  .mode-card-b {
    background: #180E0D;
    border: 1px solid #2C1A18;
    border-radius: 18px;
    padding: 22px 18px;
    text-align: left;
    transition: transform 0.2s, border-color 0.2s;
  }
  .mode-card-b:hover { transform: scale(1.02); border-color: rgba(196,137,106,0.3); }

  /* ── TIP CARD ── */
  .tip-card {
    padding: 18px 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(196,137,106,0.08) 0%, rgba(180,100,80,0.04) 100%);
    border: 1px solid rgba(196,137,106,0.2);
    border-left: 3px solid #C4896A;
    position: relative;
    overflow: hidden;
  }
  .tip-card::after {
    content: '✦';
    position: absolute;
    right: 18px; bottom: 12px;
    font-size: 28px;
    color: rgba(196,137,106,0.08);
    pointer-events: none;
  }

  /* ── INPUT ── */
  .rose-input {
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    background: #180E0D;
    border: 1px solid #2C1A18;
    color: #F8EDE8;
    font-size: 16px;
    font-family: 'Outfit', sans-serif;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .rose-input:focus {
    border-color: #C4896A;
    box-shadow: 0 0 0 3px rgba(196,137,106,0.12);
    outline: none;
  }
  .rose-input::placeholder { color: #6A4A42; }

  /* ── NAV BAR ── */
  .nav-pill {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; flex: 1; padding: 10px 4px; border-radius: 16px;
    transition: all 0.2s; border: none; background: none;
    cursor: pointer; font-family: inherit;
  }
  .nav-pill.active {
    background: rgba(196,137,106,0.14);
  }
</style>

// ─── COMPATIBILITY ENGINE ──────────────────────────────────────────────────
function getCompatibleItems(selectedItems, targetCategory, occasion) {
  return ITEMS.filter(item => {
    if (item.category !== targetCategory) return false;
    if (!item.occasionTags.includes(occasion)) return false;
    if (selectedItems.length === 0) return true;
    return selectedItems.every(sel =>
      item.styleTags.some(s => sel.styleTags.includes(s))
    );
  });
}

// ─── SCORE RING ─────────────────────────────────────────────────────────────
function ScoreRing({ score, size=80 }) {
  const r = 42; const circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  const color = score >= 88 ? C.green : score >= 75 ? C.rose : C.red;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" className="score-ring">
      <circle className="bg" cx="50" cy="50" r={r} fill="none" strokeWidth="7"/>
      <circle className="fill" cx="50" cy="50" r={r} fill="none" strokeWidth="7"
        stroke={color} strokeDasharray={`${dash} ${circ}`} strokeDashoffset="0"
        transform="rotate(-90 50 50)" />
      <text x="50" y="50" dominantBaseline="middle" textAnchor="middle"
        fill={color} fontSize="18" fontWeight="700" fontFamily="Outfit,sans-serif">{score}</text>
    </svg>
  );
}

const PIECE_VISUAL_PRESETS = {
  default:{ top:{scale:1.25,objectPosition:'center'},bottom:{scale:1.16,objectPosition:'center'},shoes:{scale:1.12,objectPosition:'center'},accessory:{scale:1.14,objectPosition:'center'},outer:{scale:1.24,objectPosition:'center top'} },
  mosaic: { top:{scale:1.4,objectPosition:'center'},bottom:{scale:1.22,objectPosition:'center'},shoes:{scale:1.18,objectPosition:'center'},accessory:{scale:1.18,objectPosition:'center'},outer:{scale:1.34,objectPosition:'center top'} },
  mini:   { top:{scale:2.2,objectPosition:'center'},bottom:{scale:1.1,objectPosition:'center'},shoes:{scale:1.08,objectPosition:'center'},accessory:{scale:1.08,objectPosition:'center'},outer:{scale:1.18,objectPosition:'center top'} },
  hero:   { top:{scale:2.6,objectPosition:'center'},bottom:{scale:1.24,objectPosition:'center'},shoes:{scale:1.16,objectPosition:'center'},accessory:{scale:1.14,objectPosition:'center'},outer:{scale:1.42,objectPosition:'center top'} },
};

function getPieceImageFrame(item, variant) {
  const p = PIECE_VISUAL_PRESETS[variant] || PIECE_VISUAL_PRESETS.default;
  const f = PIECE_VISUAL_PRESETS.default;
  const base = p[item?.category] || f[item?.category] || f.top;
  const ov = item?.imageFrame?.[variant] || item?.imageFrame?.default || null;
  return ov ? {...base,...ov} : base;
}

function PieceVisual({ item, iconSize=36, textureSize=12, variant='default' }) {
  if (item?.image) {
    const fr = getPieceImageFrame(item, variant);
    return (
      <div style={{width:'100%',height:'100%',overflow:'hidden'}}>
        <img src={item.image} alt={item.name} style={{
          width:'100%',height:'100%',objectFit:'contain',
          objectPosition:fr.objectPosition,display:'block',background:'transparent',
          transform:`scale(${fr.scale||1})`,transformOrigin:'center center',
        }}/>
      </div>
    );
  }
  const fair = item?.color && parseInt(item.color.replace('#',''),16) > 0x888888;
  return (
    <div style={{width:'100%',height:'100%',background:item?.color||C.cardBorder,
      display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
      <div style={{position:'absolute',inset:0,
        backgroundImage:`linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px)`,
        backgroundSize:`${textureSize}px ${textureSize}px`}}/>
      <span style={{fontSize:iconSize,position:'relative',zIndex:1,
        filter:fair?'drop-shadow(0 2px 4px rgba(0,0,0,0.3))':'drop-shadow(0 2px 4px rgba(0,0,0,0.6))'}}>
        {item?.icon}
      </span>
    </div>
  );
}

function NavBar({ screen, navigate }) {

    {id:'mode_b',icon:'◈', label:'Monte'  },

  const mainScreens = ['home','mode_a','mode_a_looks','mode_a_detail','mode_b_occasion','mode_b_build','saved'];
  if (!mainScreens.includes(screen)) return null;
  const activeMap = {home:'home',mode_a:'mode_a',mode_a_looks:'mode_a',mode_a_detail:'mode_a',mode_b_occasion:'mode_b',mode_b_build:'mode_b',saved:'saved'};

  return (
    <nav style={{
      position:'fixed',bottom:0,left:0,right:0,zIndex:100,
      background:`linear-gradient(to top, #0E0709 75%, rgba(14,7,9,0) 100%)`,
      padding:'8px 0 20px',

        display:'flex',justifyContent:'space-around',
        background:'rgba(26,12,14,0.88)',backdropFilter:'blur(16px)',
        border:`1px solid rgba(196,137,106,0.18)`,borderRadius:22,
        margin:'0 16px',padding:'4px',
      }}>
        {items.map(it=>(
          <button key={it.id} className={`nav-pill${active===it.id?' active':''}`}

              if(it.id==='mode_a') navigate('mode_a');
              else if(it.id==='mode_b') navigate('mode_b_occasion');
              else navigate(it.id);

            <span style={{
              fontSize:18,
              opacity:active===it.id?1:0.38,

  );

// ─── ONBOARDING ─────────────────────────────────────────────────────────────
function OnboardingScreen() {
  const { navigate, saveProfile } = useApp();
  const [step, setStep] = useState(0);
  const [name, setName] = useState('');
  const [style, setStyle] = useState('');
  const [bodyType, setBodyType] = useState('');

  const BODY_TYPES = [
    {id:'esbelta',   label:'Esbelta',    desc:'Silhueta delicada e linear',  icon:'◫'},
    {id:'média',     label:'Média',      desc:'Proporções equilibradas',      icon:'◈'},
    {id:'curvilínea',label:'Curvilínea', desc:'Curvas marcadas e definidas', icon:'◉'},
  ];

  const canNext = ()=>{
    if(step===0) return name.trim().length>=2;
    if(step===1) return style!=='';
    if(step===2) return bodyType!=='';
    return false;
  };
  const handleNext = async()=>{
    if(step<2){setStep(s=>s+1);return;}
    await saveProfile({name:name.trim(),style,bodyType});
    navigate('home');
  };
  const progress = ((step+1)/3)*100;

  return (
    <div style={{minHeight:'100vh',padding:'60px 24px 100px',maxWidth:480,margin:'0 auto'}}>
      {/* Progress */}
      <div style={{marginBottom:40}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontSize:12,color:C.gray}}>Passo {step+1} de 3</span>
          <span style={{fontSize:12,color:C.rose,fontWeight:700}}>{Math.round(progress)}%</span>
        </div>
        <div style={{height:3,background:C.cardBorder,borderRadius:2}}>
          <div style={{
            height:'100%',borderRadius:2,width:`${progress}%`,transition:'width 0.4s ease',
            background:`linear-gradient(90deg,${C.rose},${C.blush})`,
          }}/>
        </div>
      </div>

      <div className="fade-in">
        {step===0&&(
          <>
            <h2 style={{fontFamily:'Playfair Display',fontSize:28,color:C.white,marginBottom:8}}>
              Como posso te chamar?
            </h2>
            <p style={{fontSize:14,color:C.gray,marginBottom:32,lineHeight:1.55}}>
              Personalizamos as recomendações para o seu perfil.
            </p>
            <input value={name} onChange={e=>setName(e.target.value)}
              placeholder="Seu nome..." className="rose-input"
              onKeyDown={e=>e.key==='Enter'&&canNext()&&handleNext()}/>
          </>
        )}

        {step===1&&(
          <>
            <h2 style={{fontFamily:'Playfair Display',fontSize:28,color:C.white,marginBottom:8}}>
              Qual é o seu estilo?
            </h2>
            <p style={{fontSize:14,color:C.gray,marginBottom:28,lineHeight:1.55}}>
              Isso molda como sugerimos looks para você.
            </p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {STYLES.map(s=>(
                <button key={s.id} onClick={()=>setStyle(s.id)}
                  className={`style-card${style===s.id?' active':''}`}
                  style={{padding:'16px 14px'}}>
                  <div style={{fontSize:22,marginBottom:8}}>{s.emoji}</div>
                  <div style={{fontSize:14,fontWeight:600,color:C.white,marginBottom:3}}>{s.label}</div>
                  <div style={{fontSize:11,color:C.gray}}>{s.desc}</div>
                </button>
              ))}
            </div>
          </>
        )}

        {step===2&&(
          <>
            <h2 style={{fontFamily:'Playfair Display',fontSize:28,color:C.white,marginBottom:8}}>
              Seu tipo de corpo?
            </h2>
            <p style={{fontSize:14,color:C.gray,marginBottom:28,lineHeight:1.55}}>
              Ajuda a recomendar o caimento certo para você.
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {BODY_TYPES.map(b=>(
                <button key={b.id} onClick={()=>setBodyType(b.id)}
                  className={`style-card${bodyType===b.id?' active':''}`}
                  style={{padding:'18px 20px',display:'flex',alignItems:'center',gap:16,textAlign:'left'}}>
                  <span style={{fontSize:28,lineHeight:1}}>{b.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:C.white}}>{b.label}</div>
                    <div style={{fontSize:12,color:C.gray,marginTop:3}}>{b.desc}</div>
                  </div>
                  {bodyType===b.id&&<span style={{color:C.rose,fontSize:18}}>✓</span>}
                </button>
              ))}
            </div>
          </>
        )}
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'16px 24px 32px',
        background:'linear-gradient(to top, #0E0709 70%, transparent)',maxWidth:480,margin:'0 auto'}}>
        <button onClick={handleNext} disabled={!canNext()}
          className={canNext()?'btn-shimmer':''}
          style={{
            width:'100%',padding:'18px',borderRadius:16,fontSize:16,fontWeight:700,
            ...(canNext()?{}:{background:'#1E1210',color:C.gray,cursor:'default'}),
          }}>
          {step<2?'Próximo →':'Começar ✦'}
        </button>
      </div>
    </div>
  );
}

            <div style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:4,position:'relative',zIndex:1}}>{occ.label}</div>
            <div style={{fontSize:11,color:C.gray,position:'relative',zIndex:1}}>{occ.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── MODE B — BUILD STEP BY STEP ────────────────────────────────────────────
function ModeBBuildScreen({ data }) {
  const { navigate, saveLook } = useApp();
  const { occasionId } = data||{};
  const occ = OCCASIONS.find(o=>o.id===occasionId);
  const STEPS = ['top','bottom','shoes','accessory'];
  const STEP_LABELS = {top:'Parte de Cima',bottom:'Parte de Baixo',shoes:'Calçado',accessory:'Acessório (opcional)'};
  const [currentStep, setCurrentStep] = useState(0);
  const [selected, setSelected] = useState({});
  const [complete, setComplete] = useState(false);
  const [saved, setSaved] = useState(false);

  const cat = STEPS[currentStep];
  const selectedSoFar = Object.values(selected);
  const compatible = getCompatibleItems(selectedSoFar, cat, occasionId);

  const handleSelect = (item) => {
    const newSelected = {...selected,[cat]:item};
    setSelected(newSelected);
    if(currentStep<STEPS.length-1){ setTimeout(()=>setCurrentStep(s=>s+1),200); }
    else { setComplete(true); }
  };
  const handleSkipAccessory = ()=>setComplete(true);
  const handleBack = ()=>{
    if(currentStep>0){
      const prevCat=STEPS[currentStep-1];
      const ns={...selected}; delete ns[prevCat];
      setSelected(ns); setCurrentStep(s=>s-1); setComplete(false);
    } else { navigate('mode_b_occasion'); }
  };
  const handleSave = ()=>{
    const pieces={};
    Object.entries(selected).forEach(([k,v])=>{pieces[k]=v.id;});
    const look={
      id:`custom_${Date.now()}`, title:'Look Personalizado',
      style:selected.top?.styleTags[0]||'casual_chic',
      score:Math.round(Object.values(selected).reduce((a,i)=>a+i.confidenceScore,0)/Object.values(selected).length),
      pieces, outer:null,
      why:'Você montou este look peça a peça com compatibilidade de estilo garantida.',
      tips:['Certifique-se que os tons harmonizam','O caimento faz toda a diferença','Um brinco bonito eleva qualquer conjunto'],
    };
    saveLook({look,occasionId}); setSaved(true);
  };
  const avgScore = complete ? Math.round(Object.values(selected).reduce((a,i)=>a+i.confidenceScore,0)/Object.values(selected).length) : 0;

  if(complete){
    const selArr = Object.entries(selected);
    return (
      <div style={{padding:'60px 20px 100px',maxWidth:600,margin:'0 auto'}}>
        <div className="fade-up" style={{marginBottom:24}}>
          <button onClick={handleBack} style={{color:C.gray,fontSize:13,marginBottom:16}}>← Ajustar</button>
          <h2 style={{fontFamily:'Playfair Display',fontSize:26,color:C.white,marginBottom:4}}>
            Seu Look Montado
          </h2>
          <p style={{fontSize:13,color:C.gray}}>{occ?.emoji} {occ?.label}</p>
        </div>
        <div className="fade-up s1" style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',
          gap:3,borderRadius:18,overflow:'hidden',marginBottom:20}}>
          {selArr.map(([cat,item])=>(
            <div key={cat} style={{height:130,overflow:'hidden',position:'relative'}}>
              <PieceVisual item={item} iconSize={34} textureSize={12} variant="mosaic"/>
            </div>
          ))}
        </div>
        <div className="fade-up s2" style={{display:'flex',justifyContent:'center',marginBottom:20}}>
          <div style={{textAlign:'center',padding:'20px 40px',background:C.card,borderRadius:16,
            border:`1px solid ${C.cardBorder}`}}>
            <ScoreRing score={avgScore} size={80}/>
            <p style={{fontSize:12,color:C.gray,marginTop:10}}>compatibilidade do look</p>
          </div>
        </div>
        <div className="fade-up s3" style={{marginBottom:20}}>
          {selArr.map(([cat,item])=>(
            <div key={cat} style={{display:'flex',gap:14,padding:'12px 14px',background:C.card,
              borderRadius:14,border:`1px solid ${C.cardBorder}`,marginBottom:8,alignItems:'center'}}>
              <div style={{width:44,height:44,borderRadius:8,flexShrink:0,overflow:'hidden',border:`1px solid ${C.cardBorder}`}}>
                <PieceVisual item={item} iconSize={20} textureSize={8} variant="mini"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:C.gray,textTransform:'uppercase',letterSpacing:1}}>{STEP_LABELS[cat]}</div>
                <div style={{fontSize:13,fontWeight:600,color:C.white,marginTop:2}}>{item.name}</div>
              </div>
              <button onClick={()=>{const ns={...selected};delete ns[cat];setSelected(ns);setCurrentStep(STEPS.indexOf(cat));setComplete(false);}}
                style={{color:C.gray,fontSize:11,padding:'4px 10px',background:C.cardBorder,borderRadius:6,cursor:'pointer'}}>
                trocar
              </button>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={handleSave} style={{
            flex:1,padding:'16px',borderRadius:14,fontSize:14,fontWeight:700,cursor:'pointer',
            background:saved?'rgba(109,191,138,0.12)':`linear-gradient(135deg,${C.rose},${C.blush})`,
            border:saved?`1px solid ${C.green}`:'none',
            color:saved?C.green:'#1A0C09',
            ...((!saved)?{backgroundSize:'250% auto',animation:'shimmer-sweep 2.8s linear infinite'}:{}),
          }}>{saved?'✓ Salvo':'◇ Salvar Look'}</button>
          <button onClick={()=>navigate('home')} style={{
            flex:1,padding:'16px',borderRadius:14,
            background:C.card,border:`1px solid ${C.cardBorder}`,
            color:C.white,fontSize:14,fontWeight:600,cursor:'pointer',
          }}>Início</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:'60px 20px 100px',maxWidth:600,margin:'0 auto'}}>
      <div className="fade-up" style={{marginBottom:24}}>
        <button onClick={handleBack} style={{color:C.gray,fontSize:13,marginBottom:16}}>
          ← {currentStep===0?'Ocasiões':'Passo anterior'}
        </button>
        {/* Progress steps */}
        <div style={{display:'flex',gap:6,marginBottom:16}}>
          {STEPS.map((s,i)=>(
            <div key={s} style={{flex:1,height:3,borderRadius:2,transition:'background 0.3s',
              background:i<currentStep?C.rose:i===currentStep
                ?`linear-gradient(90deg,${C.rose},${C.blush})`
                :C.cardBorder}}/>
          ))}
        </div>
        <p style={{fontSize:11,color:C.rose,fontWeight:700,marginBottom:6,letterSpacing:1}}>
          PASSO {currentStep+1} DE {STEPS.length} · {occ?.emoji} {occ?.label}
        </p>
        <h2 style={{fontFamily:'Playfair Display',fontSize:26,color:C.white,marginBottom:4}}>
          Escolha: {STEP_LABELS[cat]}
        </h2>
        <p style={{fontSize:13,color:C.gray}}>
          {compatible.length} peças compatíveis {currentStep>0?'com o que você escolheu':'para esta ocasião'}
        </p>
      </div>

      {/* Selected preview */}
      {Object.keys(selected).length>0&&(
        <div className="fade-up" style={{display:'flex',gap:8,marginBottom:20,padding:'12px',
          background:C.card,borderRadius:14,border:`1px solid ${C.cardBorder}`,alignItems:'center'}}>
          <span style={{fontSize:11,color:C.gray,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8,flexShrink:0}}>Look até aqui:</span>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.values(selected).map(item=>(
              <div key={item.id} style={{width:38,height:38,borderRadius:8,overflow:'hidden',
                border:`1px solid rgba(196,137,106,0.25)`,
                boxShadow:`0 2px 8px rgba(196,137,106,0.1)`}}>
                <PieceVisual item={item} iconSize={16} textureSize={8} variant="mini"/>
              </div>
            ))}
          </div>
        </div>
      )}

      {compatible.length===0?(
        <div style={{padding:'32px',textAlign:'center',background:C.card,borderRadius:14,border:`1px solid ${C.cardBorder}`}}>
          <p style={{fontSize:14,color:C.gray,marginBottom:16}}>
            Nenhuma peça compatível encontrada para esta combinação.
          </p>
          <button onClick={handleBack} style={{color:C.rose,fontSize:14,fontWeight:600,cursor:'pointer'}}>← Mudar escolha anterior</button>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          {compatible.map((item,i)=>(
            <div key={item.id} className={`fade-up s${Math.min(i+1,6)}`}>
              <ClothingCard item={item} selected={selected[cat]?.id===item.id}
                onSelect={()=>handleSelect(item)} size="md" showName={true}/>
            </div>
          ))}
        </div>
      )}

      {cat==='accessory'&&(
        <button onClick={handleSkipAccessory} style={{
          width:'100%',padding:'14px',borderRadius:14,cursor:'pointer',
          background:'transparent',border:`1px dashed rgba(196,137,106,0.25)`,
          color:C.gray,fontSize:13,fontWeight:500,
        }}>Pular acessório — finalizar look →</button>
      )}
    </div>
  );
}

// ─── SAVED ──────────────────────────────────────────────────────────────────
function SavedScreen() {
  const { navigate, savedLooks, removeLook } = useApp();
  return (
    <div style={{padding:'60px 20px 100px',maxWidth:600,margin:'0 auto'}}>
      <div className="fade-up" style={{marginBottom:28}}>
        <h2 style={{fontFamily:'Playfair Display',fontSize:28,color:C.white,marginBottom:6}}>Looks Salvos</h2>
        <p style={{fontSize:13,color:C.gray}}>{savedLooks.length} {savedLooks.length===1?'look salvo':'looks salvos'}</p>
      </div>
      {savedLooks.length===0?(
        <div className="fade-up" style={{padding:'48px 24px',textAlign:'center',
          background:C.card,borderRadius:18,border:`1px solid ${C.cardBorder}`}}>
          <div style={{fontSize:40,marginBottom:16,opacity:0.4}}>◇</div>
          <h3 style={{fontSize:18,color:C.white,marginBottom:8}}>Nenhum look salvo ainda</h3>
          <p style={{fontSize:13,color:C.gray,marginBottom:24,lineHeight:1.65}}>
            Explore os looks e salve seus favoritos para encontrar rapidamente.
          </p>
          <button onClick={()=>navigate('mode_a')} className="btn-shimmer"
            style={{padding:'14px 28px',borderRadius:12,fontSize:14}}>
            Explorar Looks ✦
          </button>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {savedLooks.map((saved,i)=>{
            const pieces=['top','bottom','shoes','accessory'].map(c=>saved.look.pieces[c]?itemMap[saved.look.pieces[c]]:null).filter(Boolean);
            const occ=OCCASIONS.find(o=>o.id===saved.occasionId);
            const scoreColor=saved.look.score>=88?C.green:saved.look.score>=75?C.rose:C.red;
            return (
              <div key={saved.id||i} className={`fade-up s${Math.min(i+1,4)}`} style={{
                background:C.card,border:`1px solid ${C.cardBorder}`,borderRadius:16,overflow:'hidden',
              }}>
                <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(pieces.length,4)},1fr)`,height:80}}>
                  {pieces.map(item=>(
                    <div key={item.id} style={{position:'relative',overflow:'hidden'}}>
                      <PieceVisual item={item} iconSize={22} textureSize={10} variant="mini"/>
                    </div>
                  ))}
                </div>
                <div style={{height:2,
                  background:`linear-gradient(90deg,transparent,rgba(196,137,106,0.25),transparent)`}}/>
                <div style={{padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:4}}>{saved.look.title}</div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                      {occ&&<span className="tag">{occ.emoji} {occ.label}</span>}
                      <span style={{fontSize:14,fontWeight:800,color:scoreColor}}>{saved.look.score}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,marginLeft:12}}>
                    <button onClick={()=>navigate('mode_a_detail',{look:saved.look,occasionId:saved.occasionId})}
                      style={{padding:'8px 14px',borderRadius:10,
                        background:'rgba(196,137,106,0.12)',color:C.rose,fontSize:12,fontWeight:600,
                        border:`1px solid rgba(196,137,106,0.22)`,cursor:'pointer'}}>
                      Ver
                    </button>
                    <button onClick={()=>removeLook(saved.id||i)}
                      style={{padding:'8px 12px',borderRadius:10,background:'rgba(212,104,104,0.1)',
                        color:C.red,fontSize:12,fontWeight:600,border:`1px solid rgba(212,104,104,0.15)`,cursor:'pointer'}}>
                      ✕
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ───────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('welcome');
  const [screenData, setScreenData] = useState({});
  const [profile, setProfile] = useState(()=>storage.get('presenza_fem_profile'));
  const [savedLooks, setSavedLooks] = useState(()=>storage.get('presenza_fem_saved',[]));

  const navigate = useCallback((target,data={})=>{
    setScreen(target); setScreenData(data);
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const saveProfile = useCallback((p)=>{ setProfile(p); storage.set('presenza_fem_profile',p); },[]);

  const saveLook = useCallback(({look,occasionId})=>{
    const ns=[{id:`${look.id}_${Date.now()}`,look,occasionId},...savedLooks];
    setSavedLooks(ns); storage.set('presenza_fem_saved',ns);
  },[savedLooks]);

  const removeLook = useCallback((id)=>{
    const f=savedLooks.filter((s,i)=>(s.id||i)!==id);
    setSavedLooks(f); storage.set('presenza_fem_saved',f);
  },[savedLooks]);

  const ctx = {profile,savedLooks,navigate,saveProfile,saveLook,removeLook};

  const renderScreen = ()=>{
    switch(screen){
      case 'welcome':         return <WelcomeScreen/>;
      case 'onboarding':      return <OnboardingScreen/>;
      case 'home':            return <HomeScreen/>;
      case 'mode_a':          return <ModeAScreen/>;
      case 'mode_a_looks':    return <ModeALooksScreen data={screenData}/>;
      case 'mode_a_detail':   return <ModeADetailScreen data={screenData}/>;
      case 'mode_b_occasion': return <ModeBOccasionScreen/>;
      case 'mode_b_build':    return <ModeBBuildScreen data={screenData}/>;
      case 'saved':           return <SavedScreen/>;
      default:                return <HomeScreen/>;
    }
  };

  const showNav=['home','mode_a','mode_a_looks','mode_a_detail','mode_b_occasion','mode_b_build','saved'].includes(screen);

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:'0 auto',position:'relative',minHeight:'100vh'}}>
        <AmbientBackground/>
        <div style={{position:'relative',zIndex:1}}>
          {renderScreen()}
        </div>
        {showNav&&<NavBar screen={screen} navigate={navigate}/>}
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
